<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Electric Forest 2026 — Packing Checklist (pick your camping option)</title>
<meta name="description" content="Pick your Electric Forest 2026 camping option (GA, Good Life, Back 40, RV, Hotel) and get a tailored packing checklist with weather pinned on top. Progress saves on your device.">
<meta name="theme-color" content="#081410">
<meta name="color-scheme" content="dark">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
<meta property="og:title" content="Electric Forest 2026 — Packing Checklist">
<meta property="og:description" content="Pick your camping option and get a tailored packing list. Tap to check off; progress saves on your device.">
<meta property="og:type" content="website">
<style>
  :root{
    --bg0:#081410;
    --bg1:#0d2118;
    --panel:rgba(14,33,24,.72);
    --panel-line:#1d3a2a;
    --ink:#e9f3ec;
    --ink-dim:#8aa597;
    --ink-faint:#7b9285;   /* lifted to pass WCAG AA on the dark panel */
    --glow:#57efa6;      /* bioluminescent green */
    --glow-soft:#2fae79;
    --firefly:#ffd887;   /* warm string-light amber */
    --warn:#ff9b7a;      /* prohibited / heads-up */
    --warn-line:#5a2e22;
    --info-line:#1f4d39;
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(87,239,166,.10), transparent 60%),
      radial-gradient(90% 50% at 80% 0%, rgba(255,216,135,.06), transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg0));
    background-attachment:fixed;
    padding:0 14px env(safe-area-inset-bottom) 14px;
  }
  .wrap{max-width:660px;margin:0 auto;}

  /* ---------- Sticky control header (kept compact) ---------- */
  header{
    position:sticky;top:0;z-index:20;
    margin:0 -14px 12px;
    padding:12px 16px 11px;
    background:linear-gradient(180deg, rgba(8,20,16,.95), rgba(8,20,16,.82));
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border-bottom:1px solid var(--panel-line);
    overflow:hidden;
  }
  .fireflies{position:absolute;inset:0;pointer-events:none;}
  .ff{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--firefly);
      box-shadow:0 0 6px 2px rgba(255,216,135,.7);opacity:calc(.15 + var(--p,0)*.8);}
  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--glow);font-weight:700;}

  /* option selector */
  .opt-label{display:block;font-size:11px;letter-spacing:.04em;color:var(--ink-dim);font-weight:600;margin:7px 0 3px;}
  .select-shell{position:relative;}
  .select-shell::after{content:"";position:absolute;right:14px;top:50%;width:8px;height:8px;
       border-right:2px solid var(--glow);border-bottom:2px solid var(--glow);
       transform:translateY(-65%) rotate(45deg);pointer-events:none;}
  select#opt{
    width:100%;min-height:48px;font:inherit;font-size:15px;font-weight:700;color:var(--ink);
    background:#0c1f16;border:1.5px solid var(--glow-soft);border-radius:12px;
    padding:11px 38px 11px 13px;appearance:none;-webkit-appearance:none;cursor:pointer;
    line-height:1.25;touch-action:manipulation;}
  select#opt:focus-visible{outline:2px solid var(--glow);outline-offset:2px;}
  select#opt optgroup{font-weight:700;color:var(--glow);background:#0c1f16;}
  select#opt option{font-weight:500;color:var(--ink);background:#0c1f16;}

  .progwrap{display:flex;align-items:baseline;gap:8px;margin:9px 0 6px;}
  .count{font-size:22px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .count small{font-size:13px;font-weight:600;color:var(--ink-dim);}
  .bar{height:9px;border-radius:99px;background:#11271c;border:1px solid var(--panel-line);overflow:hidden;}
  .fill{height:100%;width:0%;border-radius:99px;
        background:linear-gradient(90deg,var(--glow-soft),var(--glow));
        box-shadow:0 0 12px rgba(87,239,166,calc(.25 + var(--p,0)*.55));
        transition:width .35s cubic-bezier(.2,.8,.2,1);}
  .toolbar{display:flex;gap:8px;margin-top:9px;}
  .tbtn{flex:0 0 auto;font:inherit;font-size:12px;font-weight:600;color:var(--ink-dim);
        background:transparent;border:1px solid var(--panel-line);border-radius:99px;
        padding:10px 15px;min-height:44px;cursor:pointer;transition:.15s;touch-action:manipulation;}
  .tbtn:hover{color:var(--ink);border-color:var(--glow-soft);}
  .tbtn.danger:hover{color:var(--warn);border-color:var(--warn-line);}
  .tbtn.danger.armed{color:var(--warn);border-color:var(--warn);background:rgba(255,155,122,.08);}
  .tbtn:focus-visible{outline:2px solid var(--glow);outline-offset:2px;}

  /* option sub-line (scrolls with content, not pinned) */
  .opt-sub{font-size:12.5px;color:var(--ink-dim);line-height:1.45;margin:0 2px 14px;}

  /* ---------- Reference / note blocks ---------- */
  .note-card{border-radius:var(--r);padding:13px 15px;margin:0 0 14px;font-size:13px;line-height:1.5;background:var(--panel);}
  .note-card .lbl{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:6px;}
  .note-card.info{border:1px solid var(--info-line);border-left:3px solid var(--glow-soft);}
  .note-card.info .lbl{color:var(--glow);}
  .note-card.info .body{color:var(--ink-dim);}
  .note-card.warn{border:1px solid var(--warn-line);border-left:3px solid var(--warn);}
  .note-card.warn .lbl{color:var(--warn);}
  .note-card.warn .body{color:#d8b5a8;}
  .note-card ul{margin:6px 0 0;padding-left:18px;}
  .note-card li{margin:3px 0;}
  .note-card .body p{margin:6px 0 0;}

  /* ---------- Weather (collapsible) ---------- */
  .weather{border-radius:var(--r);margin:0 0 14px;background:var(--panel);
           border:1px solid var(--info-line);border-left:3px solid var(--firefly);overflow:hidden;}
  .whead{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;
         color:var(--ink);font:inherit;text-align:left;cursor:pointer;padding:12px 15px;min-height:48px;touch-action:manipulation;}
  .whead:focus-visible{outline:2px solid var(--glow);outline-offset:-2px;}
  .wtitlewrap{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .wtitle{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--firefly);}
  .wsummary{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
  .wbody{padding:0 15px 14px;font-size:13px;line-height:1.5;color:var(--ink-dim);}
  .weather.collapsed .wbody{display:none;}
  .wdate{font-size:11px;color:var(--ink-dim);font-weight:600;margin-bottom:9px;}
  /* Grid keeps every forecast tile identical, even on a partial last row. */
  .forecast{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:0 0 10px;}
  @media (min-width:520px){ .forecast{grid-template-columns:repeat(6,1fr);} }
  .fday{text-align:center;background:#0c1f16;border:1px solid var(--panel-line);
        border-radius:10px;padding:8px 4px;min-width:0;}
  .fday .d{font-size:11px;color:var(--ink-dim);font-weight:600;}
  .fday .hi{font-size:16px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;}
  .fday .lo{font-size:12px;color:var(--ink-dim);font-variant-numeric:tabular-nums;}
  .fico{font-size:14px;line-height:1;margin:1px 0;}
  .fpop{font-size:10.5px;color:var(--ink-dim);margin-top:2px;font-variant-numeric:tabular-nums;}
  .wlive{color:var(--glow);font-weight:700;letter-spacing:.04em;}
  .weather.live{border-left-color:var(--glow);}
  .wpack{color:var(--ink);}
  .wstorm{color:#ffd2c2;margin-top:8px;}
  .wsrc{color:var(--ink-faint);font-size:11px;margin-top:8px;font-style:italic;}

  /* ---------- Sections ---------- */
  .section{background:var(--panel);border:1px solid var(--panel-line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
  .shead{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;
         color:var(--ink);font:inherit;text-align:left;cursor:pointer;padding:14px 15px;min-height:50px;touch-action:manipulation;}
  .shead:focus-visible{outline:2px solid var(--glow);outline-offset:-2px;}
  .stitle{flex:1;font-size:15px;font-weight:700;letter-spacing:-.01em;}
  .sbadge{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink-dim);
          background:#102619;border:1px solid var(--panel-line);border-radius:99px;padding:3px 9px;min-width:46px;text-align:center;}
  .sbadge.done{color:#07140d;background:var(--glow);border-color:var(--glow);}
  .chev{width:9px;height:9px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);
        transform:rotate(45deg);transition:transform .2s;margin-left:2px;flex:0 0 auto;}
  .section.collapsed .chev,.weather.collapsed .chev{transform:rotate(-45deg);}
  .items{padding:2px 6px 8px;}
  .section.collapsed .items{display:none;}

  /* ---------- Item rows ---------- */
  .item{display:flex;align-items:flex-start;gap:12px;padding:11px 9px;border-radius:11px;cursor:pointer;
        min-height:46px;transition:background .12s;touch-action:manipulation;}
  .item:hover{background:rgba(87,239,166,.05);}
  .item:active{background:rgba(87,239,166,.10);}
  .item:focus-visible{outline:2px solid var(--glow);outline-offset:-2px;}
  .box{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid #335a45;margin-top:1px;
       position:relative;transition:.15s;background:#0c1f16;}
  .box::after{content:"";position:absolute;left:7px;top:3px;width:5px;height:10px;
       border:solid #07140d;border-width:0 2.5px 2.5px 0;transform:rotate(45deg) scale(0);
       transition:transform .15s cubic-bezier(.2,1.4,.4,1);}
  .item.checked .box{background:var(--glow);border-color:var(--glow);box-shadow:0 0 10px rgba(87,239,166,.5);}
  .item.checked .box::after{transform:rotate(45deg) scale(1);}
  .txt{flex:1;font-size:14.5px;line-height:1.4;padding-top:2px;}
  .txt .n{display:block;font-size:12.5px;color:var(--ink-dim);line-height:1.45;margin-top:3px;}
  .item.checked .txt{color:var(--ink-faint);text-decoration:line-through;text-decoration-color:rgba(123,146,133,.55);}
  .item.checked .txt .n{color:var(--ink-faint);text-decoration:line-through;}

  footer{text-align:center;color:var(--ink-dim);font-size:12px;line-height:1.5;padding:18px 8px 30px;}
  footer .save-state{color:var(--glow-soft);font-weight:600;}
  footer a{color:var(--ink-dim);}

  .done-banner{display:none;text-align:center;margin:0 0 14px;padding:14px;border-radius:var(--r);
    border:1px solid var(--glow-soft);background:rgba(87,239,166,.08);color:var(--glow);font-weight:700;font-size:15px;}
  .done-banner.show{display:block;}

  .visually-hidden{position:absolute;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;clip:rect(0 0 0 0);border:0;}

  @media (prefers-reduced-motion: no-preference){
    .ff{animation:float var(--d,6s) ease-in-out infinite alternate;}
    @keyframes float{from{transform:translate(0,0)}to{transform:translate(var(--mx,6px),var(--my,-8px))}}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="fireflies" id="fireflies" aria-hidden="true"></div>
    <div class="eyebrow">Electric Forest 2026 · Rothbury, MI</div>
    <label class="opt-label" for="opt">Your camping / lodging option</label>
    <div class="select-shell">
      <select id="opt"></select>
    </div>
    <div class="progwrap">
      <span class="count" id="count">0 <small>/ 0 packed</small></span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="toolbar">
      <button class="tbtn" id="toggleAll" type="button">Collapse all</button>
      <button class="tbtn danger" id="reset" type="button" aria-live="polite">Reset all</button>
    </div>
  </header>

  <div class="opt-sub" id="optSub"></div>
  <div id="weatherHost"></div>
  <div class="done-banner" id="doneBanner">🌲 Fully packed. Have a beautiful Forest.</div>
  <div id="content"></div>

  <footer>
    <span id="saveState" class="save-state">Checkmarks save automatically on this device.</span><br>
    Tap a row to mark it packed. Switching options keeps a separate list for each.<br>
    Not official Electric Forest material — confirm dates &amp; rules at <a href="https://www.electricforest.com" target="_blank" rel="noopener">electricforest.com</a>.
  </footer>
</div>

hydration pack (or one factory-sealed water bottle ≤1 gallon)","Phone + power bank","ID + card","Sunscreen, lip balm, sunglasses, bandana","Warm layer","Earplugs","Small handmade gifts, pins, kandi for trading","Totem ≤7 ft on light PVC (no wood/metal, nothing sharp on top, no threatening messaging)","LED accessories","Biodegradable glitter","Factory-sealed single-dose naloxone nasal spray (4 mg)"],"alcohol":"Campgrounds, 21+: one case of beer/seltzer OR one box of wine per person; no glass, no liquor, no kegs; cannot be carried into the venue.","meds":"Keep prescriptions in original labeled bottles; ID must match; declare at search.","harmReduction":"Bunk Police will NOT be on-site in 2026 — source any fentanyl/xylazine test strips and reagent/purity kits before arrival; keep prescriptions labeled; factory-sealed single-dose naloxone nasal spray is permitted."},"providesVocab":{"tent":"Shelter (pre-pitched tent or hard-sided unit) provided — no need to bring your own tent or stakes/mallet.","sleeping-gear":"Sleeping bags and/or sleeping pads/cots provided.","bedding":"Real bed(s) with sheets, pillows, and comforters/blankets provided.","cooling":"Cooling unit / air conditioning provided in your lodging.","towels":"Bath/shower towels provided.","furniture":"Camp furniture provided (side tables, chairs, and/or bistro table).","chairs":"Seating/chairs provided.","lighting":"In-unit lighting provided (lanterns or battery light).","lighting-partial":"Only a single battery light is provided — bring an extra lantern.","tent-lock":"A lock for the tent/unit is provided.","kitchen":"Full kitchen/kitchenette provided (cooktop/oven/microwave, fridge, sink).","cookware":"Cookware, plates/cups/bowls, and utensils provided.","coffee-maker":"Coffee maker (and toaster) provided.","soap":"Soap / dish soap / toilet paper provided.","cleaning":"Cleaning supplies provided (broom, trash bin).","comp-showers":"Complimentary showers + A/C restrooms provided (no shower-haul needed, but personal toiletries still required).","shared-showers":"Shared shower facilities available (basic, not A/C).","concierge":"On-site concierge / Good Life base perks (A/C lounge, charging, dedicated entrances).","shuttle":"Dedicated or 24-hr shuttle service provided.","parking-pass":"A parking/car pass is included with this option.","car-onsite":"You camp beside your car (car/companion pass included; pack heavier).","power-30a":"30A electrical service provided at the site.","full-hookup":"Full hook-up provided: 30A electrical + water + sewer (no daily services or water-rationing needed).","in-tent-outlet":"A single in-tent outlet is provided, rated for charging small electronic devices only.","hotel-room":"Hotel room with linens, towels, A/C, housekeeping, and a real bathroom — no camping gear needed.","swim":"Beach/pool/swim access included with this option.","in-camp-ice":"In-camp ice sales available (lighter cooler-loading possible).","brunch":"Daily brunch provided (Thu–Sun, 9 AM–1 PM ET) — reduces breakfast-food needs.","meal-card":"$25 meal card per person + welcome basket included.","rv-bring":"BYO RV option — you bring and run the RV.","linens-unconfirmed":"EF does not confirm linens/towels for this lodging in writing — bring your own as backup or confirm with the Good Life concierge.","pillows-provided":"Pillows provided","hard-shelter":"RV or hard-sided lodging — no camping tent needed","power-real":"Real household AC power — run any appliance (RV 30A, cabin/log home, hotel)","power-tent":"A/C pre-set tent — real powered circuit, but the guest outlet is officially rated for charging small devices (don’t overload)"},"catalog":[{"id":"photo-id","category":"Documents & Entry","text":"Photo ID","note":"Name must match your prescription labels."},{"id":"rfid-wristband","category":"Documents & Entry","text":"RFID wristband(s)","note":"Register in the EF app BEFORE putting them on."},{"id":"vehicle-pass","category":"Documents & Entry","text":"Vehicle / parking pass","note":"Exterior upper driver's-side windshield, before you arrive."},{"id":"arrival-confirmation","category":"Documents & Entry","text":"Arrival email / package confirmation"},{"id":"backup-card-cash","category":"Documents & Entry","text":"Backup card + some cash","note":"Venue is cashless; cash is for tolls, gas, off-site stops."},{"id":"ef-app-maps","category":"Documents & Entry","text":"EF app + offline map & set times saved","note":"Cell service degrades at peak (40k–50k people)."},{"id":"printed-directions","category":"Documents & Entry","text":"Printed directions + Will Call (Winston Speedway Box Office) location","note":"Cell service is unreliable on-site."},{"id":"spare-car-key","category":"Documents & Entry","text":"Spare car key","note":"Kept separate from your main key.","addedBy":["car-onsite","parking-pass","rv-bring"],"providedBy":["hotel-room"]},{"id":"phone-numbers-meetup","category":"Documents & Entry","text":"Written phone numbers + a group meetup spot/time"},{"id":"daypack-bag","category":"Documents & Entry","text":"Small non-framed day bag / fanny pack","note":"For carrying essentials around the venue — every bag is searched; framed or oversized packs are banned inside."},{"id":"tent","category":"Shelter & Sleep","text":"Tent","note":"Metal hammers get confiscated — bring a rubber mallet.","providedBy":["tent","hotel-room","hard-shelter"]},{"id":"shade-canopy","category":"Shelter & Sleep","text":"Shade canopy / pop-up","note":"Limited tree cover in most GA fields; stake and guy it out — pop-ups catch wind.","providedBy":["tent","hotel-room"]},{"id":"sleeping-bag-pad","category":"Shelter & Sleep","text":"Sleeping bag + sleeping pad or air mattress","providedBy":["sleeping-gear","bedding","hotel-room","linens-unconfirmed"]},{"id":"pillow","category":"Shelter & Sleep","text":"Pillow","providedBy":["bedding","hotel-room","pillows-provided","linens-unconfirmed"]},{"id":"sheet-liner-preset","category":"Shelter & Sleep","text":"Sheet or sleeping-bag liner","note":"Provided sleeping bags/cots come without sheets — bring a liner.","addedBy":["sleeping-gear"],"providedBy":["bedding","hotel-room"]},{"id":"extra-warm-blanket","category":"Shelter & Sleep","text":"Extra warm blanket or sleeping-bag liner","note":"Nights hit the low-to-mid 50s; no throw blanket is included.","addedBy":["bedding"],"providedBy":["hotel-room"]},{"id":"mattress-topper","category":"Shelter & Sleep","text":"Mattress topper","note":"Comfort over the provided bed.","addedBy":["bedding"],"providedBy":["hotel-room"]},{"id":"linens-backup","category":"Shelter & Sleep","text":"Your own sheets / blankets / pillows as backup","note":"EF doesn't confirm linens for this unit — bring as backup or confirm with the Good Life concierge (goodlife@electricforestfestival.com).","addedBy":["linens-unconfirmed"],"providedBy":["hotel-room"]},{"id":"eye-mask-earplugs","category":"Shelter & Sleep","text":"Eye mask + earplugs","note":"Sun's up around 6 AM."},{"id":"confirm-cooling","category":"Shelter & Sleep","text":"On arrival: confirm cooling-unit operation + nearest shower/shuttle","addedBy":["cooling"],"providedBy":["hotel-room"]},{"id":"padlock-valuables","category":"Shelter & Sleep","text":"Padlock for valuables","note":"Peace of mind for gear in camp.","providedBy":["hotel-room"]},{"id":"cooler-ice","category":"Camp Kitchen & Food","text":"Cooler + ice plan","note":"Buy ice at your last stop; locals sell out on EF weekend.","providedBy":["kitchen","hotel-room"]},{"id":"groceries","category":"Camp Kitchen & Food","text":"Food / groceries","note":"Low/no-cook options: bars, fruit, nut butter, wraps, jerky, oatmeal, pre-cooked protein.","providedBy":["hotel-room"]},{"id":"food-containers","category":"Camp Kitchen & Food","text":"Non-glass food containers + dry-goods bin","providedBy":["kitchen","hotel-room"]},{"id":"camp-stove","category":"Camp Kitchen & Food","text":"Coleman-style camp stove + fuel","note":"≤1 lb propane only — grills, charcoal & open flame are banned.","providedBy":["kitchen","hotel-room"]},{"id":"utensils-plates","category":"Camp Kitchen & Food","text":"Utensils, plates, cups","providedBy":["cookware","hotel-room"]},{"id":"dish-soap-tub","category":"Camp Kitchen & Food","text":"Biodegradable dish soap + wash tub","providedBy":["soap","hotel-room"],"note":"Strain greywater into the pod sinks — leave no trace."},{"id":"paper-towels-trash","category":"Camp Kitchen & Food","text":"Paper towels","providedBy":["cleaning","hotel-room"]},{"id":"coffee-supplies","category":"Camp Kitchen & Food","text":"Coffee / tea supplies","providedBy":["coffee-maker","hotel-room"]},{"id":"own-coffee","category":"Camp Kitchen & Food","text":"Your own coffee (grounds/pods)","note":"Coffee maker is provided but coffee is not.","addedBy":["coffee-maker"],"providedBy":["hotel-room"]},{"id":"refill-bottle","category":"Water & Hydration","text":"Reusable non-glass bottle + hydration pack","note":"Both must be EMPTY to enter the venue."},{"id":"gallon-jugs","category":"Water & Hydration","text":"Camp drinking water — gallon jugs or cases of bottled water (non-glass)","note":"For camp; the refill stations are free too. Freeze a few bottles to double as cooler ice that melts into drinking water. (No outside drinks enter the venue — carry your empty refill bottle instead.)","providedBy":["hotel-room"]},{"id":"electrolytes","category":"Water & Hydration","text":"Electrolyte packets / tabs","note":"Essential in the heat and humidity."},{"id":"clothes-day","category":"Clothing","text":"Day: breathable tops, shorts, tanks/dresses; extra socks + underwear"},{"id":"clothes-night","category":"Clothing","text":"Night: hoodie/fleece, long pants, pashmina/onesie","note":"Genuinely cold after dark."},{"id":"clothes-rain","category":"Clothing","text":"Rain: packable jacket/poncho + quick-dry layers","note":"Cotton stays wet."},{"id":"sun-hat-gaiter","category":"Clothing","text":"Bandana / neck gaiter, sun hat, sunglasses"},{"id":"swimsuit","category":"Clothing","text":"Swimsuit","addedBy":["swim"],"providedBy":["hotel-room"]},{"id":"costumes","category":"Clothing","text":"Costumes / themed outfits"},{"id":"shoes-closed-toe","category":"Footwear","text":"Broken-in closed-toe shoes","note":"Miles of uneven terrain."},{"id":"shoes-rotate","category":"Footwear","text":"Second pair to rotate","note":"So wet/muddy ones can dry."},{"id":"rain-boots","category":"Footwear","text":"Rain / waterproof boots","note":"Mud is real after storms."},{"id":"camp-sandals","category":"Footwear","text":"Flip-flops / sandals","note":"One pair does double duty around camp and in the shared/comp showers."},{"id":"water-shoes","category":"Footwear","text":"Water shoes","note":"For the beach/pool.","addedBy":["swim"],"providedBy":["hotel-room"]},{"id":"towels","category":"Toiletries & Hygiene","text":"Towel(s)","note":"At least one, ideally a spare.","providedBy":["towels","hotel-room"]},{"id":"beach-towel","category":"Toiletries & Hygiene","text":"Beach / swim towel + dry bag","note":"Separate towel for the beach/pool; dry bag keeps gear dry.","addedBy":["swim"],"providedBy":["hotel-room"]},{"id":"soap-shampoo","category":"Toiletries & Hygiene","text":"Soap, shampoo/conditioner, deodorant, toothbrush/toothpaste"},{"id":"toilet-paper","category":"Toiletries & Hygiene","text":"Toilet paper + tissues","providedBy":["soap"]},{"id":"wet-wipes-sanitizer","category":"Toiletries & Hygiene","text":"Wet wipes + hand sanitizer"},{"id":"glasses-contacts","category":"Toiletries & Hygiene","text":"Glasses / contacts + spares; nail clippers"},{"id":"shaving","category":"Toiletries & Hygiene","text":"Shaving supplies"},{"id":"feminine-hygiene","category":"Toiletries & Hygiene","text":"Feminine hygiene products"},{"id":"body-glide","category":"Toiletries & Hygiene","text":"Body Glide / Gold Bond","note":"Chafing."},{"id":"first-aid-kit","category":"Health, First Aid & Meds","text":"First aid kit","note":"Bandages, blister pads, ointment, pain reliever, anti-diarrheal, antihistamine."},{"id":"prescriptions","category":"Health, First Aid & Meds","text":"Prescriptions in original labeled bottles","note":"Name matches your ID."},{"id":"naloxone","category":"Health, First Aid & Meds","text":"Naloxone / Narcan","note":"Factory-sealed; explicitly permitted."},{"id":"test-strips","category":"Health, First Aid & Meds","text":"Fentanyl/xylazine test strips + reagent kit","note":"Bunk Police will NOT be on-site in 2026 — source any drug-checking supplies BEFORE arrival."},{"id":"rehydration-melatonin","category":"Health, First Aid & Meds","text":"Electrolytes / rehydration salts; melatonin"},{"id":"sunscreen","category":"Sun & Bug Protection","text":"Sunscreen SPF 30+","note":"Reapply through the day."},{"id":"lip-balm-spf","category":"Sun & Bug Protection","text":"Lip balm with SPF"},{"id":"insect-repellent","category":"Sun & Bug Protection","text":"Insect repellent"},{"id":"after-sun-aloe","category":"Sun & Bug Protection","text":"After-sun aloe"},{"id":"phone-cable","category":"Electronics & Power","text":"Phone + cable"},{"id":"power-banks","category":"Electronics & Power","text":"2 power banks per person","note":"Primarily for the venue and long charging lines; cell towers collapse with 40k–50k people."},{"id":"wall-charger","category":"Electronics & Power","text":"Wall / USB charger + adapters"},{"id":"headlamp","category":"Electronics & Power","text":"Headlamp + backup flashlight","providedBy":["hotel-room"]},{"id":"lanterns-string-lights","category":"Electronics & Power","text":"Lanterns + LED string lights for camp","providedBy":["lighting","hotel-room","lighting-partial"]},{"id":"extra-lantern","category":"Electronics & Power","text":"Extra lantern","note":"Only one battery light is included.","addedBy":["lighting-partial"],"providedBy":["hotel-room"]},{"id":"spare-batteries","category":"Electronics & Power","text":"Spare batteries"},{"id":"walkie-talkies","category":"Electronics & Power","text":"Walkie-talkies (optional)","note":"Cell towers collapse with 40k–50k people."},{"id":"led-chargers","category":"Electronics & Power","text":"Chargers / batteries for LED gear + flow toys"},{"id":"battery-fan","category":"Electronics & Power","text":"Battery / USB fan","note":"Humid Michigan nights — essential in the no-A/C tents (Electric Avenue, Bungalow, GA Pre-Set) and any BYO tent; a handy backup with A/C or power.","providedBy":["hotel-room"]},{"id":"cord-30a","category":"Electronics & Power","text":"30A power cord/adapter + 30A surge protector","note":"Needed for 30A shore power.","addedBy":["power-30a","full-hookup"],"providedBy":["hotel-room"]},{"id":"rv-hookup-hoses","category":"Electronics & Power","text":"Sewer hose + fittings, drinking-water hose + pressure regulator","note":"Full hook-up: connect water and sewer.","addedBy":["full-hookup"],"providedBy":["hotel-room"]},{"id":"rv-self-contained","category":"Electronics & Power","text":"Fresh-water fill + grey/black-water plan, leveling blocks + wheel chocks, battery/solar power","note":"Self-contained: no on-site dump. External gas generators are banned — built-in RV generator, solar, or a portable power station only.","addedBy":["rv-bring"],"providedBy":["full-hookup","hotel-room"]},{"id":"camp-chair","category":"Comfort & Camp Setup","text":"Camp chair (1 per person)","note":"Chairs aren't allowed inside the venue.","providedBy":["chairs","hotel-room"]},{"id":"reflective-tarps","category":"Comfort & Camp Setup","text":"Reflective tarps (4) + bungee cords","note":"Silver side OUT, with an air gap off the tent fabric. Cinch them down if weather turns; they catch wind like sails. For pre-set tents, check with the concierge that covering the tent is OK.","providedBy":["hotel-room","hard-shelter"]},{"id":"side-table","category":"Comfort & Camp Setup","text":"Folding outdoor side table","providedBy":["furniture","hotel-room"]},{"id":"outdoor-rug","category":"Comfort & Camp Setup","text":"Outdoor rug / mat for the tent entrance","providedBy":["hotel-room"]},{"id":"hammock","category":"Comfort & Camp Setup","text":"Hammock + tree straps","providedBy":["hotel-room"]},{"id":"tapestries-flags","category":"Comfort & Camp Setup","text":"Tapestries / flags / group totem","note":"Personalize and find your camp.","providedBy":["hotel-room"]},{"id":"hand-mister","category":"Comfort & Camp Setup","text":"Hand mister / squirt toy","providedBy":["hotel-room"]},{"id":"yoga-mat","category":"Comfort & Camp Setup","text":"Yoga mat","providedBy":["hotel-room"]},{"id":"multi-tool","category":"Comfort & Camp Setup","text":"Multi-tool","note":"Camp only — no knives in the venue.","providedBy":["hotel-room"]},{"id":"rubber-mallet","category":"Comfort & Camp Setup","text":"Rubber mallet","note":"Metal hammers get confiscated.","providedBy":["tent","hotel-room"]},{"id":"duct-tape-ziptie","category":"Comfort & Camp Setup","text":"Duct tape; zip ties; jumper cables","providedBy":["hotel-room"]},{"id":"wagon-cart","category":"Comfort & Camp Setup","text":"Wagon / cart for the walk-in haul","note":"Carts are allowed in the campground (banned only IN the venue).","providedBy":["hotel-room"]},{"id":"trash-bags","category":"Cleaning & Leave-No-Trace","text":"Heavy-duty trash + recycling bags","note":"Tie them down so they don't blow away.","providedBy":["cleaning","hotel-room"]},{"id":"reusable-shopping-bag","category":"Cleaning & Leave-No-Trace","text":"Reusable shopping bag for ice / supply hauls","providedBy":["hotel-room"]},{"id":"donate-gear","category":"Cleaning & Leave-No-Trace","text":"Plan to donate usable gear on the way out","providedBy":["hotel-room"]},{"id":"pins-lanyard","category":"Rave / Festival Extras","text":"Pins + lanyard","note":"For the pin-trading culture."},{"id":"kandi-gifts","category":"Rave / Festival Extras","text":"Kandi + small handmade gifts","note":"Giving Tree: handmade/meaningful only."},{"id":"led-gear","category":"Rave / Festival Extras","text":"LED gear, glow accessories, flow toys","note":"With chargers."},{"id":"totem","category":"Rave / Festival Extras","text":"Totem","note":"≤7 ft, light PVC (no wood/metal), nothing sharp on top."},{"id":"body-paint","category":"Rave / Festival Extras","text":"Body / face paint + remover","note":"Biodegradable glitter only."},{"id":"notebook-camera","category":"Rave / Festival Extras","text":"Notebook/pen; phone or compact camera","note":"No pro / detachable-lens cameras in the venue."},{"id":"hairbrush-grooming","category":"Toiletries & Hygiene","text":"Hairbrush/comb, hair ties + bobby pins, compact mirror, makeup"},{"id":"qtips-baby-powder","category":"Toiletries & Hygiene","text":"Q-tips / cotton swabs + baby powder","note":"Powder helps with chafe and damp feet."},{"id":"dry-shampoo","category":"Toiletries & Hygiene","text":"Dry shampoo + travel styling product"},{"id":"hair-styling-tools","category":"Electronics & Power","text":"Hair dryer / straightener / curling iron","note":"Power-hungry. Runs fine on RV / cabin / log-home power. In an A/C tent the outlet is meant for small devices — use one tool at a time so you don’t overload and knock out the tent’s power (A/C included).","addedBy":["power-real","power-tent"],"providedBy":["hotel-room"]},{"id":"ac-box-fan-cooling","category":"Electronics & Power","text":"A/C box fan","note":"Runs off real AC power (RV / cabin / log home). On an A/C-tent outlet it usually works but isn’t guaranteed — don’t overload, and keep the battery fan as backup.","addedBy":["power-real","power-tent"],"providedBy":["hotel-room"]},{"id":"playing-cards-games","category":"Comfort & Camp Setup","text":"Playing cards / UNO / camp + car games"},{"id":"umbrella","category":"Comfort & Camp Setup","text":"Umbrella","note":"Sun and rain."},{"id":"pee-jug","category":"Comfort & Camp Setup","text":"Pee jug / night bottle (lidded, non-glass)","providedBy":["hotel-room"]},{"id":"camp-broom-dustpan","category":"Cleaning & Leave-No-Trace","text":"Camp broom + dustpan","note":"Keep the tent floor and site clear; pack out everything.","providedBy":["cleaning","hotel-room"]},{"id":"lighter","category":"Camp Kitchen & Food","text":"Lighter(s)","note":"For the ≤1 lb propane camp stove; handy around camp.","providedBy":["kitchen","hotel-room"]},{"id":"cooking-tools","category":"Camp Kitchen & Food","text":"Cooking tools: tongs, spatula, cutting board, skillet, foil","note":"Camp only — knives/blades are banned inside the venue.","providedBy":["cookware","kitchen","hotel-room"]},{"id":"ziploc-bags","category":"Camp Kitchen & Food","text":"Ziploc / resealable bags","note":"Double as phone waterproofing in rain.","providedBy":["hotel-room"]},{"id":"camp-snacks","category":"Camp Kitchen & Food","text":"Grab-and-go snacks (bars, jerky, trail mix, candy)","note":"Easy daytime fuel that needs no cooking or cooler.","providedBy":["hotel-room"]},{"id":"condiment-packets","category":"Camp Kitchen & Food","text":"Salt & pepper + single-serve condiment packets","providedBy":["hotel-room"]},{"id":"drinks-cans-only","category":"Camp Kitchen & Food","text":"Drinks — cans/seltzers or boxed wine only (21+)","note":"Campground 21+: one case of beer/seltzer OR one box of wine per person. No glass, no kegs, no liquor; none enters the venue.","providedBy":["hotel-room"]},{"id":"air-pump","category":"Shelter & Sleep","text":"Air pump for the air mattress","note":"Walk-in sites may have no car power — bring a battery pump (or a 12V inflator if camping beside your car).","providedBy":["sleeping-gear","bedding","hotel-room","linens-unconfirmed"]},{"id":"portable-speaker","category":"Rave / Festival Extras","text":"Personal Bluetooth speaker","note":"Handheld/USB only, under 11x5x5″ to clear venue rules; larger speakers are banned."},{"id":"electric-kettle","category":"Camp Kitchen & Food","text":"Electric kettle / coffee maker","note":"Runs freely on RV / cabin / log-home power. In an A/C tent the outlet is charging-only, so a low-watt kettle may not work — the ≤1 lb camp stove + a stovetop kettle is the safe bet.","addedBy":["power-real","power-tent"],"providedBy":["coffee-maker","kitchen","hotel-room"]},{"id":"extension-cord","category":"Electronics & Power","text":"Extension cord + outdoor / GFCI power strip","note":"Reaches or splits the site / in-tent outlet; outdoor-rated only. (RVs also bring the 30A shore-power cord, listed separately.)","addedBy":["power-real","power-tent","in-tent-outlet"],"providedBy":["hotel-room"]},{"id":"heavy-stakes","category":"Shelter & Sleep","text":"Heavy-duty / extra-long stakes (10–12 in)","note":"Storm-prone venue — standard stakes pull out of soft/wet ground in wind. Forged or spiral 10–12″ stakes hold tents and pop-ups; flying canopies are a common EF sight. Drive at ~60° and guy out everything.","providedBy":["tent","hotel-room","hard-shelter"]},{"id":"extra-tarps","category":"Shelter & Sleep","text":"Extra tarps (ground + rain)","note":"Ground tarp + an overhead rain tarp. Tuck the ground tarp UNDER the tent footprint — any tarp sticking out collects rain and funnels a puddle under you.","providedBy":["tent","hotel-room","hard-shelter"]},{"id":"ratchet-straps","category":"Comfort & Camp Setup","text":"Ratchet straps + tie-downs","note":"Cinch down pop-ups, tarps, and vehicle/rooftop loads — wind sends shade structures flying at EF.","providedBy":["hotel-room"]},{"id":"rv-extra-tent","category":"Shelter & Sleep","text":"Optional extra / pup tent + stakes (extra sleepers)","note":"RV sites are officially RV-only, but a small extra-sleeper tent on your own 20×50 pad is a common gray area — confirm with EF and keep it on your site alongside the RV + car.","addedBy":["rv-bring"],"providedBy":["hotel-room"]}],"options":[{"id":"ac-landing","name":"A/C Landing","tier":"Good Life","lodging":"Glamping tent with a real bed (1 queen or 2 twins) and cooling unit.","arrival":"Wednesday June 24 included (Good Life).","provides":["tent","bedding","cooling","furniture","lighting","tent-lock","comp-showers","concierge","shuttle","power-tent"],"notes":["Provided: tent, real bed, sheets/pillows/comforters, cooling unit, side table, battery light, tent lock, comp showers + A/C restrooms, 24-hr concierge, shuttle.","NOT provided: towels (bring your own) and chairs (bring a camp chair).","If reflective-tarping the pre-set tent, confirm with the concierge that covering it is OK."]},{"id":"ga-tent-camping","name":"GA Tent Camping","tier":"GA","lodging":"BYO tent in the GA campground.","arrival":"Thursday June 25 (Wednesday +$50 add-on).","provides":["shared-showers"],"notes":["Everything — full master camping kit.","Buy a parking pass separately (or arrive with a multi-person car).","Bring extra shade — limited tree cover."]},{"id":"ga-car-camping","name":"GA Car Camping","tier":"GA","lodging":"BYO tent beside your car; site ~12'×35'.","arrival":"Thursday June 25 (Wednesday +$50 add-on).","provides":["shared-showers","car-onsite"],"notes":["Full master kit; pack heavier since the car is on-site (bigger cooler, more water, car-powered inflator).","Narrow site (~12 ft wide) — a low-profile canopy fits better than a large pavilion."]},{"id":"ga-preferred-car-camping","name":"GA Preferred Car Camping","tier":"GA","lodging":"BYO tent beside your car, guaranteed site near main entrance; site ~20'×25' (new for 2026).","arrival":"Wednesday June 24 included.","provides":["shared-showers","car-onsite"],"notes":["Full master kit; the extra space supports a full canopy + larger group setup.","Guaranteed location near the main venue entrance regardless of arrival time."]},{"id":"ga-rv","name":"GA RV","tier":"GA","lodging":"BYO RV; includes 1 companion car (\u003c16 ft) pass. No electrical hookup.","arrival":"Wednesday June 24 included.","provides":["car-onsite","rv-bring","hard-shelter"],"notes":["Run the RV self-contained — fresh water (no hookup), full propane for onboard systems, battery/solar power.","External gas generators banned; RV built-in gas generators and solar OK.","Leveling blocks function renderItems(opt){
  const F = new Set(opt.provides || []);
  return (DATA.catalog || []).filter(it=>{
    if(it.providedBy && it.providedBy.some(f=>F.has(f))) return false;   // provided => removed
    if(it.addedBy && it.addedBy.length) return it.addedBy.some(f=>F.has(f)); // conditional add
    return true;                                                          // universal
  });
}
function groupByCategory(items){
  const order=[], map=new Map();
  items.forEach(it=>{ if(!map.has(it.category)){map.set(it.category,[]);order.push(it.category);} map.get(it.category).push(it); });
  return order.map(cat=>({cat, items:map.get(cat)}));
}

/* ---------------- Persistence (tiered, namespaced per option) ---------------- */
const hasStore = !!(window.storage && window.storage.get && window.storage.set);
const hasLocal = (function(){ try{ const k="__ef_t__"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } })();
const mem = {};
function keyFor(optId){ return "ef"+YEAR+":"+optId; }
const LAST_KEY = "ef"+YEAR+":__last";

// Read a value, falling through tiers if a higher tier is missing OR errors,
// so a transient primary-tier failure can't drop a good saved copy below it.
async function loadRaw(key){
  if(hasStore){ try{ const r=await window.storage.get(key); if(r && r.value!=null) return r.value; }catch(e){} }
  if(hasLocal){ try{ const v=localStorage.getItem(key); if(v!=null) return v; }catch(e){} }
  return (key in mem) ? mem[key] : null;
}
async function saveRaw(key,val){
  if(hasStore){ try{ await window.storage.set(key,val); return; }catch(e){} }
  if(hasLocal){ try{ localStorage.setItem(key,val); return; }catch(e){} }
  mem[key]=val;
}
async function loadState(optId){
  const raw = await loadRaw(keyFor(optId));
  if(!raw) return {};
  try{ return JSON.parse(raw) || {}; }catch(e){ return {}; }
}
async function saveState(){ if(currentOpt) await saveRaw(keyFor(currentOpt.id), JSON.stringify(state)); }

/* ---------------- Weather (per-option range, static baseline + live auto-update) ---------------- */
let wRefs=null;
let weatherDays=[];      // full-range days Wed–Mon (static baseline; replaced by live fetch)
let weatherIsLive=false;
let weatherDateText="";
function dayLabel(dateStr){
  const p=String(dateStr).split("-"); if(p.length!==3) return dateStr;
  const y=+p[0],m=+p[1],d=+p[2]; const wd=new Date(y,m-1,d).getDay();
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][wd]+" "+m+"/"+d;
}
function wIcon(code){
  if(code==null) return "";
  if(code>=95) return "⛈️"; if(code>=80) return "🌦️"; if(code>=71&&code<=77) return "🌨️";
  if(code>=51&&code<=67) return "🌧️"; if(code>=45&&code<=48) return "🌫️";
  if(code>=1&&code<=3) return "🌤️"; if(code===0) return "☀️"; return "🌥️";
}
function rangeStr(arr){ const v=arr.filter(n=>n!=null&&!isNaN(n)); if(!v.length) return null; const a=Math.min(...v),b=Math.max(...v); return a===b?String(a):a+"–"+b; }
function tilesHtml(days){
  return days.map(d=>'<div class="fday"><div class="d">'+esc(d.day)+'</div>'+
    (d.icon?'<div class="fico">'+d.icon+'</div>':'')+
    '<div class="hi">'+(d.high!=null?esc(d.high):'—')+'°</div>'+
    '<div class="lo">'+(d.low!=null?esc(d.low):'—')+'°</div>'+
    (d.pop!=null?'<div class="fpop">💧'+esc(d.pop)+'%</div>':'')+'</div>').join("");
}
function summaryText(days, stormy){
  const hi=rangeStr(days.map(d=>d.high)), lo=rangeStr(days.map(d=>d.low));
  if(!hi||!lo) return "";
  return "Highs "+hi+"° · nights "+lo+"° · "+(stormy?"storms likely":"watch for rain");
}
function renderWeather(days, stormy, dateText, isLive){
  if(!wRefs) return;
  wRefs.forecastEl.innerHTML=tilesHtml(days);
  wRefs.summaryEl.textContent=summaryText(days, stormy);
  wRefs.dateEl.innerHTML=(isLive?'<span class="wlive">● Live</span> ':'')+esc(dateText||"");
  wRefs.card.classList.toggle("live", !!isLive);
}
// Each option only sees its own on-site window: Wednesday only for options that
// include Wednesday arrival (opt.arrivalDate), through Monday teardown for everyone.
function optWeatherRange(opt){
  const ev=(DATA.event&&DATA.event.dates)||{};
  const start=(opt&&opt.arrivalDate)||ev.arrivalEarly||ev.start||null;
  const end=ev.departure||ev.end||null;
  return {start, end};
}
function renderWeatherForOption(opt){
  if(!wRefs || !weatherDays.length) return;
  const {start,end}=optWeatherRange(opt);
  const days=weatherDays.filter(d=>d.date && (!start||d.date>=start) && (!end||d.date<=end));
  const use=days.length?days:weatherDays;
  const stormy = weatherIsLive ? use.some(d=>(d.pop!=null&&d.pop>=50)||(d.code!=null&&d.code>=95)) : true;
  renderWeather(use, stormy, weatherDateText, weatherIsLive);
}
function buildWeather(){
  const w=DATA.weather||{}; const host=document.getElementById("weatherHost");
  const card=document.createElement("section"); card.className="weather";
  const bodyId="weather-body";
  const head=document.createElement("button"); head.className="whead"; head.type="button"; head.setAttribute("aria-controls",bodyId);

  const chev=document.createElement("span"); chev.className="chev"; head.appendChild(chev);
  const body=document.createElement("div"); body.className="wbody"; body.id=bodyId;
  body.innerHTML=
    '<div class="wdate"></div>'+
    '<div class="forecast"></div>'+
    (w.packFor?'<p class="wpack">'+esc(w.packFor)+'</p>':'')+
    (w.stormNote?'<p class="wstorm">⚠️ '+esc(w.stormNote)+'</p>':'')+
    (w.climatology?'<p>'+esc(w.climatology)+'</p>':'')+
    (w.sources?'<p class="wsrc">'+esc(w.sources)+'</p>':'');
  card.appendChild(head); card.appendChild(body);
  host.appendChild(card);

  wRefs={ card, summaryEl:head.querySelector(".wsummary"), dateEl:body.querySelector(".wdate"), forecastEl:body.querySelector(".forecast") };
  // Static baseline first (works offline); storms are the known historical risk.
  weatherDays=(w.forecast||[]).map(d=>({date:d.date, day:d.day||dayLabel(d.date), high:d.high, low:d.low, icon:"", pop:null, code:null}));
  weatherIsLive=false;
  weatherDateText=(w.pulledDate?"Typical forecast (pulled "+w.pulledDate+") — re-check 2–3 days out.":"");
  renderWeather(weatherDays, true, weatherDateText, false);

  const startCollapsed = !!(window.matchMedia && window.matchMedia("(max-width:560px)").matches);
  card.classList.toggle("collapsed", startCollapsed);
  head.setAttribute("aria-expanded", startCollapsed?"false":"true");
  head.addEventListener("click",()=>{ card.classList.toggle("collapsed"); head.setAttribute("aria-expanded", card.classList.contains("collapsed")?"false":"true"); });

  fetchLiveWeather();   // progressive enhancement; leaves static data in place if it fails
}
// Pull a live daily forecast for the festival dates from Open-Meteo (free, no key,
// CORS-ok, no PII). Silently keeps the static baseline if offline/blocked/out-of-range.
async function fetchLiveWeather(){
  const L=(DATA.weather&&DATA.weather.live)||null;
  const ev=(DATA.event&&DATA.event.dates)||null;
  const start=ev&&(ev.arrivalEarly||ev.start), end=ev&&(ev.departure||ev.end);
  if(!L||!start||!end||typeof fetch!=="function") return;
  const url="https://api.open-meteo.com/v1/forecast"+
    "?latitude="+encodeURIComponent(L.latitude)+"&longitude="+encodeURIComponent(L.longitude)+
    "&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode"+
    "&temperature_unit=fahrenheit&timezone="+encodeURIComponent(L.timezone||"America/Detroit")+
    "&start_date="+encodeURIComponent(start)+"&end_date="+encodeURIComponent(end);
  let json;
  try{
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),6500);
    const res=await fetch(url,{signal:ctrl.signal}); clearTimeout(to);
    if(!res.ok) return; json=await res.json();
  }catch(e){ return; }
  const dl=json&&json.daily;
  if(!dl||!Array.isArray(dl.time)||!dl.time.length) return;
  const days=dl.time.map((t,i)=>({
    date:t, day:dayLabel(t),
    high: dl.temperature_2m_max? Math.round(dl.temperature_2m_max[i]) : null,
    low:  dl.temperature_2m_min? Math.round(dl.temperature_2m_min[i]) : null,
    pop:  dl.precipitation_probability_max? dl.precipitation_probability_max[i] : null,
    code: dl.weathercode? dl.weathercode[i] : null,
    icon: wIcon(dl.weathercode? dl.weathercode[i] : null)
  })).filter(d=>d.high!=null&&!isNaN(d.high));
  if(!days.length) return;
  weatherDays=days; weatherIsLive=true;
  let stamp=""; try{ stamp=new Date().toLocaleDateString(undefined,{month:"short",day:"numeric"}); }catch(e){}
  weatherDateText="Updated "+stamp+" · live forecast for your dates";
  renderWeatherForOption(currentOpt);   // re-render for the currently selected option
}

function prohibitedCard(){
  const p=DATA.prohibited||{};
  const d=document.createElement("div"); d.className="note-card warn";
  let html='<span class="lbl">Do NOT pack — confiscated at the gate</span><div class="body">';

  if(p.permittedDaypack&&p.permittedDaypack.length){ html+='<p><b>OK in your venue daypack:</b> '+esc(p.permittedDaypack.join("; "))+'.</p>'; }
  if(p.alcohol){ html+='<p><b>Alcohol (campground, 21+):</b> '+esc(p.alcohol)+'</p>'; }
  if(p.meds){ html+='<p><b>Meds:</b> '+esc(p.meds)+'</p>'; }
  if(p.harmReduction){ html+='<p><b>Harm reduction:</b> '+esc(p.harmReduction)+'</p>'; }
  html+='</div>';
  d.innerHTML=html; return d;
}

  TOTAL=0; itemEls=[]; sectionMeta=[];

  content.appendChild(providedCard(opt));

  const groups=groupByCategory(renderItems(opt));
  groups.forEach((g,si)=>{
    sectionMeta.push({cat:g.cat, count:g.items.length});
    const section=document.createElement("section"); section.className="section";
    if(allCollapsed) section.classList.add("collapsed");
    const bodyId="sec-"+si;
    const head=document.createElement("button"); head.className="shead"; head.type="button";
    head.setAttribute("aria-expanded", allCollapsed?"false":"true");
    head.setAttribute("aria-controls", bodyId);
    const badge=document.createElement("span"); badge.className="sbadge"; badge.id="badge-"+si;
    head.innerHTML='<span class="stitle">'+esc(g.cat)+'</span>';
    const chev=document.createElement("span"); chev.className="chev";
    head.appendChild(badge); head.appendChild(chev);
    head.addEventListener("click",()=>{
      section.classList.toggle("collapsed");
      head.setAttribute("aria-expanded", section.classList.contains("collapsed")?"false":"true");
    });
    section.appendChild(head);

    const list=document.createElement("div"); list.className="items"; list.id=bodyId;
    g.items.forEach(it=>{
      const id=it.id; TOTAL++;
      const row=document.createElement("div"); row.className="item"; row.id="row-"+id;
      row.setAttribute("role","checkbox"); row.setAttribute("aria-checked","false"); row.setAttribute("tabindex","0");
      const box=document.createElement("div"); box.className="box";
      const txt=document.createElement("div"); txt.className="txt";
      txt.innerHTML=esc(it.text)+(it.note?'<span class="n">'+esc(it.note)+'</span>':'');
      row.appendChild(box); row.appendChild(txt);
      const toggle=()=>setChecked(id, !state[id]);
      row.addEventListener("click",toggle);
      row.addEventListener("keydown",e=>{ if(e.key===" "||e.key==="Enter"){ e.preventDefault(); toggle(); } });
      list.appendChild(row);
      itemEls.push({id, row, si});
    });
    section.appendChild(list);
    content.appendChild(section);
  });

  content.appendChild(prohibitedCard());
}

/* ---------------- State sync ---------------- */
function setChecked(id, val, skipSave, skipRender){
  if(val) state[id]=true; else delete state[id];
  const o=itemEls.find(x=>x.id===id);
  if(o){ o.row.classList.toggle("checked",!!val); o.row.setAttribute("aria-checked", val?"true":"false"); }
  if(!skipSave) saveState();
  if(!skipRender) updateProgress();
}
function updateProgress(){
  let done=0; itemEls.forEach(x=>{ if(state[x.id]) done++; });   // same per-row basis as TOTAL/badges
  document.getElementById("count").innerHTML=done+' <small>/ '+TOTAL+' packed</small>';
  const pct=TOTAL? done/TOTAL : 0;
  document.getElementById("fill").style.width=(pct*100).toFixed(1)+"%";
  document.documentElement.style.setProperty("--p", pct.toFixed(3));
  sectionMeta.forEach((sm,si)=>{
    let c=0; itemEls.forEach(x=>{ if(x.si===si && state[x.id]) c++; });
    const b=document.getElementById("badge-"+si);
    if(b){ b.textContent=c+"/"+sm.count; b.classList.toggle("done", c===sm.count && sm.count>0); }
  });
  document.getElementById("doneBanner").classList.toggle("show", done===TOTAL && TOTAL>0);
}

/* ---------------- Select an option (guarded against overlapping switches) ---------------- */
async function selectOption(optId, userInitiated){
  const gen=++selectGen;
  const opt=DATA.options.find(o=>o.id===optId) || DATA.options[0];
  currentOpt=opt;
  document.getElementById("opt").value=opt.id;
  document.getElementById("optSub").textContent=[opt.lodging, opt.arrival?("Arrival: "+opt.arrival):null].filter(Boolean).join(" · ");
  buildChecklist(opt);
  renderWeatherForOption(opt);   // weather window matches this option's arrival → Monday
  const loaded=await loadState(opt.id);
  if(gen!==selectGen) return;                 // superseded by a newer selection
  state=loaded;
  itemEls.forEach(x=>{ if(state[x.id]) setChecked(x.id, true, true, true); });
  updateProgress();
  await saveRaw(LAST_KEY, opt.id);
  if(gen!==selectGen) return;
  if(userInitiated){
    if(history.replaceState) history.replaceState(null,"","#"+opt.id);
    document.getElementById("content").scrollIntoView({block:"start", behavior:"smooth"});
  } else if(location.hash.slice(1)!==opt.id && history.replaceState){
    history.replaceState(null,"","#"+opt.id);
  }
}

/* ---------------- Controls ---------------- */
function wireControls(){
  document.getElementById("toggleAll").addEventListener("click",e=>{
    allCollapsed=!allCollapsed;
    document.querySelectorAll(".section").forEach(s=>{
      s.classList.toggle("collapsed",allCollapsed);
      const h=s.querySelector(".shead"); if(h) h.setAttribute("aria-expanded",allCollapsed?"false":"true");
    });
    e.target.textContent=allCollapsed?"Expand all":"Collapse all";
  });
  const resetBtn=document.getElementById("reset");
  let armed=false, t=null;
  resetBtn.addEventListener("click",()=>{
    if(!armed){
      armed=true; resetBtn.classList.add("armed"); resetBtn.textContent="Tap again to clear";
      t=setTimeout(()=>{armed=false;resetBtn.classList.remove("armed");resetBtn.textContent="Reset all";},3000);
      return;
    }
    clearTimeout(t); armed=false; resetBtn.classList.remove("armed"); resetBtn.textContent="Reset all";
    state={}; itemEls.forEach(x=>{ x.row.classList.remove("checked"); x.row.setAttribute("aria-checked","false"); });
    saveState(); updateProgress();
  });
  window.addEventListener("hashchange",()=>{ const h=location.hash.slice(1); if(h && h!==(currentOpt&&currentOpt.id) && DATA.options.some(o=>o.id===h)) selectOption(h,false); });
}

/* ---------------- Fireflies ---------------- */
function fireflies(){
  const host=document.getElementById("fireflies"); if(!host) return;
  for(let i=0;i<10;i++){
    const f=document.createElement("span"); f.className="ff";
    f.style.left=(5+Math.random()*90)+"%";
    f.style.top=(10+Math.random()*75)+"%";
    f.style.setProperty("--d",(4+Math.random()*5).toFixed(1)+"s");
    f.style.setProperty("--mx",(Math.random()*14-7).toFixed(1)+"px");
    f.style.setProperty("--my",(-6-Math.random()*10).toFixed(1)+"px");
    f.style.animationDelay=(Math.random()*4).toFixed(1)+"s";
    host.appendChild(f);
  }
}

/* ---------------- Init ---------------- */
(async function init(){
  buildSelect();
  buildWeather();
  wireControls();
  fireflies();
  if(!hasStore && !hasLocal){ document.getElementById("saveState").textContent="Checkmarks stay while this view is open."; }
  const hash=location.hash.slice(1);
  let startId = (hash && DATA.options.some(o=>o.id===hash)) ? hash : null;
  if(!startId){ const last=await loadRaw(LAST_KEY); if(last && DATA.options.some(o=>o.id===last)) startId=last; }
  if(!startId) startId = DATA.options[0].id;
  await selectOption(startId, false);
})();
</script>
